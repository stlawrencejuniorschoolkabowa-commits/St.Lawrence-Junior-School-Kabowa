<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=frontend/index-redesign.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to St. Lawrence Junior School...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            color: white;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 24px;
            margin: 0;
        }
        p {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
    <script>
        // Fallback redirect if meta refresh doesn't work
        window.location.href = "frontend/index-redesign.html";
    </script>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h1>St. Lawrence Junior School - Kabowa</h1>
        <p>Redirecting to homepage...</p>
    </div>
</body>
</html>
